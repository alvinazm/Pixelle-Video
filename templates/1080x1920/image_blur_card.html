<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1080">
    <meta name="template:media-height" content="1920">
    <meta name="viewport" content="width=1080, height=1920">
    <title>模糊背景卡片 - 1080x1920</title>

    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 1080px; height: 1920px; overflow: hidden; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            position: relative;
            background: transparent; /* 移除黑色背景 */
        }

        /* 背景使用图片并做模糊处理 */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{image}}");
            background-size: cover;
            background-position: center;
            filter: blur(24px) brightness(0.9);
            transform: scale(1.1);
            z-index: 0;
        }

        /* 主图片铺满整个页面 */
        .image-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 字幕居中显示 */
        .caption {
            position: fixed;
            top: 90%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            padding: 24px 36px;
            text-align: center;
            font-size: 48px;
            font-weight: 400;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            font-family: 'ArtisticFont', 'Noto Serif SC', 'Noto Sans SC', 'PingFang SC', serif;
            letter-spacing: 2px;
            z-index: 3;
        }

    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="image-box">
        <img src="{{image}}" alt="内容图片">
    </div>
    <div class="caption">{{text}}</div>
</body>
</html>
